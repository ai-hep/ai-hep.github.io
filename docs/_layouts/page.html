---
layout: default
---
{% assign page_name = page.name | split: '.' | first %}
<link rel="stylesheet" href="{{ '/assets/css/' | append: page_name | append: '.css' | relative_url }}" onerror="this.remove()">

<article class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.display-title | default: page.title | escape }}</h1>
    {% if page.subtitle %}
      <p class="subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

</article>
